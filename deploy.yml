name: Build & Deploy → Hostinger

on:
  push:
    branches: [ master ]

permissions:
  contents: read

env:
  BUILD_DIR: ./dist/
  DEPLOY_DIR: /public_html/
  NODE_VERSION_FILE: .nvmrc

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871  # v4.2.1

      - name: Installation Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Build Vite
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ${{ env.BUILD_DIR }}

      - name: Déploiement FTP vers Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTPSERVER }}
          username: ${{ secrets.FTPUSERNAME }}
          password: ${{ secrets.FTPPASSWORD }}
          local-dir: ${{ env.BUILD_DIR }}
          server-dir: ${{ env.DEPLOY_DIR }}
          dangerous-clean-slate: false

      - name: Deployment Summary
        if: success()
        run: echo "✅ Successfully deployed to Hostinger" >> $GITHUB_STEP_SUMMARY
