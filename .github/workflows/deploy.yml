name: 🚀 Build & Deploy → blmlecolefrancaise.com

on:
  push:
    branches: [ master, main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Récupération du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Installation Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🔨 Build Vite (production)
        run: npm run build
        env:
          NODE_ENV: production

      - name: ✅ Vérification du build
        run: |
          echo "Fichiers générés dans dist/ :"
          ls -la dist/
          echo "Assets :"
          ls -la dist/assets/ 2>/dev/null || echo "Pas de dossier assets"

      - name: 📂 Copie actualites.html (standalone)
        run: cp actualites.html dist/actualites.html

      - name: 🌐 Déploiement Hostinger FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 194.164.74.73
          username: u376691524
          password: ${{ secrets.FTP_PASSWORD }}
 