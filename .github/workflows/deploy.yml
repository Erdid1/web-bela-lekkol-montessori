name: 🚀 Build & Deploy → blmlecolefrancaise.com

on:
  push:
    branches: [ master, main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Récupération du code
        uses: actions/checkout@v4

      - name: 🟢 Installation Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🔨 Build Vite (production)
        run: npm run build
        env:
          NODE_ENV: production

      - name: ✅ Vérification du build
        run: |
          echo "=== Fichiers dans dist/ ==="
          ls -la dist/
          echo "=== Assets ==="
          ls -la dist/assets/ 2>/dev/null || echo "Pas de dossier assets"

      - name: 📂 Copie actualites.html
        continue-on-error: true
        run: cp actualites.html dist/actualites.html

      - name: 🌐 Déploiement Hostinger FTP
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 194.164.74.73
          username: u376691524
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /domains/blmlecolefrancaise.com/public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**

      - name: 🌐 Déploiement GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "blmlecolefrancaise.com" > dist/CNAME
          cd dist
          git init -b gh-pages
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "deploy: ${{ github.sha }}"
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push origin gh-pages --force
          echo "✅ GitHub Pages déployé avec succès"
